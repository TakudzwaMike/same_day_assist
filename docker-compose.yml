version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_ACCESS_SECRET=sda-access-secret-key-12345
      - JWT_REFRESH_SECRET=sda-refresh-secret-key-67890
      - CLIENT_URL=http://localhost
    volumes:
      - uploads-data:/app/uploads
      - db-data:/app/prisma

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  uploads-data:
  db-data:
